name: opporto_project
description: "AI Job Recommendation - Opporto Project"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # 🎨 UI & Design Packages
  google_fonts: ^6.3.2
  flutter_native_splash: ^2.4.7
  pinput: ^6.0.2
  google_nav_bar: ^5.0.7
  line_icons: ^2.0.1
  dotted_border: ^2.1.0
  cupertino_icons: ^1.0.2
  file_picker: ^8.1.2
  json_annotation: ^4.8.1

  # 🗺️ Maps & Location
  flutter_map: ^5.0.0
  latlong2: ^0.9.0
  connectivity_plus: ^7.0.0
  geocoding: ^2.0.5
  google_maps_flutter: ^2.14.2
  geolocator: ^14.0.2

  # 🔍 Search & Autocomplete
  flutter_typeahead: ^5.1.0
  google_places_flutter: ^2.0.6
  flutter_google_places_sdk: ^0.3.4

  # 🏗️ State Management
  provider: ^6.1.5+1

  # 🌐 Networking - للـ OpenAI API
  http: ^1.6.0
  dio: ^5.9.2
  permission_handler: ^11.0.1

  # 💾 Storage
  shared_preferences: ^2.2.0

  # 📅 Calendar
  table_calendar: ^3.0.9

  # 🤖 AI & ChatBot - الجديد!
  flutter_dotenv: ^5.1.0        # للـ API Key الآمن
  gpt_markdown: ^1.1.2          # عرض الـ Markdown
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12         # للـ code generation
  json_serializable: ^6.8.0     # للـ JSON

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env                       # ✅ الـ API Key هنا!